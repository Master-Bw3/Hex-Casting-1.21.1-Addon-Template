# questions

modid:
  type: str
  help: Mod ID (eg. minecraft, hexcasting)
  validator: |
    {%- import "macros/validators.jinja" as validators -%}
    {{- validators.not_empty(modid) -}}
    {{- validators.regex(modid, "^[a-z][a-z0-9_]{1,63}$") -}}

display_name:
  type: str
  help: Display name
  default: "{{ modid|capitalize|replace('_', ' ') }}"

description:
  type: str
  help: Description
  default: "{{ display_name }} addon for Hex Casting"

github_user:
  type: str
  help: GitHub username
  validator: |
    {%- import "macros/validators.jinja" as validators -%}
    {{- validators.not_empty(github_user) -}}

sanitized_github_user:
  when: false
  default: |
    {%- set v = github_user|lower|replace('-', '_') -%}
    {{- '_'~v if v[0].isdigit() else v -}}

github_repo:
  type: str
  help: GitHub repository name
  default: "{{ modid }}"

java_package:
  type: str
  help: Base Java package (eg. net.minecraft, at.petrak.hexcasting)
  default: "io.github.{{ sanitized_github_user }}.{{ modid }}"
  validator: |
    {%- import "macros/validators.jinja" as validators -%}
    {{- validators.not_empty(java_package) -}}
    {{- validators.java_package(java_package) -}}

mod_version:
  type: str
  help: Initial mod version
  default: "1.0.0"

minecraft_version_in_mod_version:
  type: bool
  help: Include Minecraft version in mod version? (eg. v{{ mod_version }}+1.20.1)
  default: true

mit_license:
  type: bool
  help: Use the MIT license? (If not, you should add a license manually.)
  default: true

advanced:
  type: bool
  help: Show advanced options?
  default: false

kotlin_package:
  when: "{{ advanced }}"
  type: str
  help: Base Kotlin package with escaped keywords (eg. gay.object.hexdebug -> gay.`object`.hexdebug)
  default: "{{ java_package }}"
  validator: |
    {%- if kotlin_package|replace('`', '') != java_package -%}
      Value must be semantically equivalent to base Java package
    {%- endif -%}
    {%- if kotlin_package|select('equalto', '`')|join|length % 2 != 0 -%}
      Value must not contain unbalanced backticks
    {%- endif -%}

classname:
  when: "{{ advanced }}"
  type: str
  help: "Classname base (eg. '{{ modid|capitalize }}' -> '{{ modid|capitalize }}Client.java')"
  default: "{{ modid|capitalize }}"
  validator: |
    {%- import "macros/validators.jinja" as validators -%}
    {{- validators.not_empty(classname) -}}
    {{- validators.java_identifier(classname) -}}

default_branch:
  when: "{{ advanced }}"
  type: str
  default: main

sources_url:
  when: "{{ advanced }}"
  type: str
  default: "https://github.com/{{ github_user }}/{{ github_repo }}"

homepage_url:
  when: "{{ advanced }}"
  type: str
  default: "https://{{ github_user|lower }}.github.io/{{ github_repo }}"

issues_url:
  when: "{{ advanced }}"
  type: str
  default: "https://github.com/{{ github_user }}/{{ github_repo }}/issues"

nix_shell:
  when: "{{ advanced }}"
  type: bool
  help: Include a shell.nix to create a development environment via nix
  default: true
# static/computed values

package_path:
  when: false
  default: "{{ java_package|replace('.', '/') }}"

# Copier settings

_subdirectory: template

_exclude:
  # for copier-template-tester
  - ".ctt"
  - "ctt.toml"
  # defaults (https://copier.readthedocs.io/en/latest/configuring/#exclude)
  - "copier.yaml"
  - "copier.yml"
  - "~*"
  - "*.py[co]"
  - "__pycache__"
  - ".git"
  - ".DS_Store"
  - ".svn"

_envops:
  keep_trailing_newline: true
  trim_blocks: true
  lstrip_blocks: true

_message_after_copy: |-
  Next steps:
  1. Look through the generated project to make sure everything looks good.
  2. Set up your Python environment and lockfile:
       uv sync
  3. Add the generated files (including uv.lock) to Git:
       git add .
  4. Make ./gradlew executable:
       git update-index --chmod=+x gradlew
  5. Commit and push:
       git commit -m "Set up mod template"
       git push
  6. Set up GitHub Pages: https://hexdoc.hexxy.media/docs/guides/deployment/github-pages
  7. Set up the release workflow: https://github.com/FallingColors/hexdummy#usage
